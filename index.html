<!DOCTYPE html>
<html>
<head>
<title>Homepage</title>
<link href='https://fonts.googleapis.com/css?family=Audiowide' rel='stylesheet'>

<style>
body {
    font-family: 'Audiowide';
    font-size: 22px;
    margin: 0;
    background-color: white;
    text-align: center;
}

/* NAVBAR */
nav {
    position: relative;
    padding: 20px 40px;
}

.logo {
    position: absolute;
    left: 40px;
    top: 20px;
}

.logo img {
    width: 100px;
    height: 100px;
}

.nav-links {
    display: flex;
    justify-content: center;
    gap: 60px;
}

nav a {
    color: black;
    text-decoration: none;
}

/* HERO */
.hero img {
    width: 90%;
    max-width: 1200px;
    height: auto;
}

/* TITLE */
.title {
    font-size: 75px;
    font-family: Impact;
    color: black;
    display: inline-block;
    padding: 10px;
    margin-top: 20px;
}

/* BANNERS */
.banner {
    display: flex;
    width: 100%;
    margin-top: 20px;
}

.banner a {
    width: 50%;
}

.banner img {
    width: 100%;
    height: 100%;
    display: block;
}

/* SHOP TITLE */
.shop-title {
    font-size: 50px;
    text-decoration: underline;
    margin-top: 40px;
}

/* CAROUSEL */
.carousel {
    position: relative;
    width: 100%;
    overflow: hidden;
    margin-top: 20px;
}

.carousel-track {
    display: flex;
    transition: transform 0.5s linear;
}

.carousel-track a {
    flex: 0 0 33.3333%;
    margin: 0 5px;
}

.carousel-track img {
    width: 100%;
    height: 100%;
    display: block;
}

/* ARROWS */
.arrow {
    position: absolute;
    top: 40%;
    background: black;
    color: white;
    border: none;
    font-size: 30px;
    padding: 10px;
    cursor: pointer;
    z-index: 10;
    opacity: 0.7;
}

.arrow:hover {
    opacity: 1;
}

.left { left: 10px; }
.right { right: 10px; }
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">
        <a href = "index.html"><img src="https://i.ibb.co/qWn9WxL/Untitled-design.png"></a href>
    </div>

    <div class="nav-links">
        <a href="aboutm.html">About</a>
        <a href="products.html">products</a>
        <a href="Contact.html">Contact Us</a>

        <!-- CART -->
        <a href="cart.html">Cart 🛒 (<span id="cart-count">0</span>)</a>
    </div>
</nav>

<!-- HERO -->
<div class="hero">
    <img src="https://www.abpconcept.paris/cdn/shop/files/airforce1-allig_2000x.gif?v=1709899822">
</div>

<!-- TITLE -->
<div class="title">
    "COMFORTABLE AND FASHION ARE ACHEIVABLE"
</div>

<!-- BANNERS -->
<div class="banner">
    <a href="#products">
        <img src="https://static.nike.com/a/images/f_auto/dpr_3.0,cs_srgb/h_496,c_limit/ff9a7214-2e04-4312-8c59-b05911d2ba4b/nike-just-do-it.jpg">
    </a>
    <a href="#products">
        <img src="https://static.nike.com/a/images/f_auto,cs_srgb/w_1536,c_limit/a22e7bb8-4517-4349-80d4-fc184c4c72db/men-s-shoes-clothing-accessories.jpg">
    </a>
</div>

<!-- SHOP -->
<div class="shop-title">SHOP NOW</div>

<!-- CAROUSEL -->
<div class="carousel">
    <button class="arrow left" onclick="moveSlide(-1)">❮</button>
    <div class="carousel-track" id="track">
        <a href="products.html"><img src="https://static.nike.com/a/images/c_limit,w_592,f_auto/t_product_v1/5eb3d983-e731-4a7a-8990-446d231c2229/air-max-impact-4-basketball-shoes-5gf3h2.png"></a>
        <a href="products.html"><img src="https://static.nike.com/a/images/t_PDP_1280_v1/f_auto,q_auto:eco/741b1b39-4a28-451d-b144-c6d22121c739/zoom-fly-5-road-running-shoes-tMJ7vL.png"></a>
        <a href="products.html"><img src="https://static.nike.com/a/images/t_PDP_1280_v1/f_auto,q_auto:eco/6a3671b8-f115-44f6-9ab6-3798d55210eb/custom-nike-air-max-97-shoes-by-you.png"></a>
        <a href="products.html"><img src="https://static.nike.com/a/images/t_PDP_1280_v1/f_auto,q_auto:eco/e566b6ab-ec2e-411b-b07d-a65fd3a1de33/custom-nike-dunk-low-by-you-su24.png"></a>
        <a href="products.html"><img src="https://static.nike.com/a/images/t_PDP_1280_v1/f_auto,q_auto:eco/741b1b39-4a28-451d-b144-c6d22121c739/zoom-fly-5-road-running-shoes-tMJ7vL.png"></a>
    </div>
    <button class="arrow right" onclick="moveSlide(1)">❯</button>
</div>

<script>
const track = document.getElementById("track");
let autoSlide;
let position = 0;

track.innerHTML += track.innerHTML;

function moveSlide(direction = 1) {
    clearInterval(autoSlide);
    position += direction * 33.3333;
    track.style.transition = "transform 0.5s linear";
    track.style.transform = `translateX(-${position}%)`;

    setTimeout(() => {
        if(position >= 100) {
            track.style.transition = "none";
            position -= 100;
            track.style.transform = `translateX(-${position}%)`;
        } else if(position < 0) {
            track.style.transition = "none";
            position += 100;
            track.style.transform = `translateX(-${position}%)`;
        }
    }, 500);
}

function startAutoSlide() {
    autoSlide = setInterval(() => moveSlide(1), 2000);
}

startAutoSlide();

/* CART COUNT */
function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    document.getElementById("cart-count").innerText = cart.length;
}

updateCartCount();
</script>

</body>
</html>
